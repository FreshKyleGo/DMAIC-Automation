<svg viewBox="0 0 640 640" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <!--
    Minimal corner accent: a soft radial glow behind a segmented ring (5
    arcs, echoing the DMAIC phases) bleeding off the top-right corner.
    Opacity is baked in here so it stays a faint accent wherever embedded.
  -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#91c13e" stop-opacity="0.16" />
      <stop offset="100%" stop-color="#91c13e" stop-opacity="0" />
    </radialGradient>
  </defs>

  <circle cx="460" cy="180" r="300" fill="url(#glow)" />

  <circle cx="460" cy="180" r="220" fill="none" stroke="#91c13e" stroke-width="1" opacity="0.12" />

